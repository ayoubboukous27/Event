name: Update Selected French EPG

on:
  schedule:
    - cron: '0 */3 * * *'  # كل 3 ساعات
  workflow_dispatch:

permissions:
  contents: write  # ✅ صلاحية الكتابة على المستودع

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Generate Selected French EPG
        run: python generate_epg_fr_selected.py

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add canal_epg_fr_selected.xml
          git commit -m "Update Selected French EPG $(date -u +"%Y-%m-%d %H:%M:%S")" || echo "No changes"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
